<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 80" width="100%" height="100%">
  <defs>
    <!-- Premium Orange Gradient for the Icon -->
    <linearGradient id="zucroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#FF4500" />
    </linearGradient>
    <!-- Subtle glow effect for dark backgrounds -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF6A00" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(10, 5)">
    <!-- Tech & Growth Expert Icon (Z + Arrow Concept) -->
    <g filter="url(#subtleGlow)">
      <!-- Background Hexagon/Shield Shape Layer -->
      <path d="M25,10 L55,10 L70,35 L55,60 L25,60 L10,35 Z" fill="none" stroke="url(#zucroGrad)" stroke-width="2.5" opacity="0.4" />
      <!-- Sharp Dynamic 'Z' that transforms into an upward growth arrow -->
      <path d="M22,20 L52,20 L26,50 L56,50 M44,40 L56,50 L44,54" fill="none" stroke="url(#zucroGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Small tech dot representing precision -->
      <circle cx="56" cy="20" r="3.5" fill="#FFFFFF" />
    </g>

    <!-- Typography Section -->
    <!-- "ZUCRO" in Bold Orange -->
    <text x="90" y="46" font-family="'Montserrat', 'Arial Black', sans-serif" font-size="34" font-weight="900" fill="#FF6A00" letter-spacing="1.5">ZUCRO</text>
    
    <!-- "EXPERTS" in clean, high-tech White -->
    <text x="242" y="46" font-family="'Montserrat', 'Helvetica', sans-serif" font-size="34" font-weight="400" fill="#FFFFFF" letter-spacing="2">EXPERTS</text>
    
    <!-- Optional Tagline (Growth & Automation) -->
    <text x="92" y="64" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" font-weight="600" fill="#9CA3AF" letter-spacing="4" opacity="0.8">MARKETING • AUTOMATION</text>
  </g>
</svg>
